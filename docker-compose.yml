services:
  agent-runner:
    build: .
    volumes:
      - .:/app
    environment:
      - WIKIMIND_URL=http://wikimind:7842
    depends_on:
      - wikimind

  wikimind:
    build: 
      context: ./infrastructure/wikimind-core
    ports:
      - "7842:7842"
    volumes:
      - ./infrastructure/wikimind-core/.data:/app/.data
    environment:
      - DB_TYPE=sqlite
